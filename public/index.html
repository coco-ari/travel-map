<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>吃货地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/wechat.css">
</head>
<body ontouchstart="">
  <div id="app">
    <header class="navbar">
      <span class="navbar-title">吃货地图</span>
      <div class="navbar-right">
        <button class="navbar-btn-more" id="more-btn" onclick="openMoreMenu()">···</button>
      </div>
    </header>

    <!-- More Menu Dropdown -->
    <div id="more-menu" class="dropdown-menu hidden">
      <button class="dropdown-item" onclick="toggleVisitedFilter()">
        <span id="more-visited-label">显示已吃</span>
      </button>
      <a href="/admin" class="dropdown-item">管理</a>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
      <input id="search-input" class="search-input" placeholder="搜索店铺名..." type="search">
    </div>

    <!-- Card View -->
    <main id="card-view" class="hidden">
      <div id="card-list"></div>
      <div id="card-empty" class="card-empty hidden"></div>
    </main>

    <!-- Map View (default) -->
    <div id="map-container"></div>

    <!-- Map Controls - unified floating panel -->
    <div class="map-controls visible" id="map-controls">
      <div class="view-toggle-inline">
        <button class="view-btn-inline view-btn-active" id="view-map-btn">地图</button>
        <button class="view-btn-inline" id="view-card-btn">卡片</button>
      </div>
      <div id="longpress-hint" class="longpress-hint-inline">长按地图上的空白处可添加店铺</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
