<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>吃货地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/wechat.css">
</head>
<body ontouchstart="">
  <div id="app">
    <header class="navbar">
      <span class="navbar-title">吃货地图</span>
      <div class="navbar-right">
        <a href="/admin" class="navbar-btn">管理</a>
        <a href="/visited" class="navbar-btn">已吃</a>
      </div>
    </header>

    <!-- Search + View Toggle -->
    <div class="search-bar">
      <input id="search-input" class="search-input" placeholder="搜索店铺名..." type="search">
    </div>
    <div class="view-toggle">
      <button class="view-btn view-btn-active" id="view-card-btn">卡片</button>
      <button class="view-btn" id="view-map-btn">地图</button>
    </div>

    <!-- Card View -->
    <main id="card-view">
      <div id="card-list"></div>
      <div id="card-empty" class="card-empty hidden"></div>
    </main>

    <!-- Map View -->
    <div id="map-container" class="hidden"></div>
    <div id="longpress-hint" class="longpress-hint hidden">长按地图添加店铺</div>
    <div class="toggle-row" id="show-all-row" style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);padding:8px 16px;border-radius:24px;display:flex;align-items:center;gap:10px;z-index:999;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:1px solid rgba(0,0,0,0.06);">
      <label class="toggle">
        <input type="checkbox" id="show-all-toggle" onchange="toggleShowAll()">
        <span class="toggle-slider"></span>
      </label>
      <span style="font-size:13px;font-weight:500;color:var(--text-secondary);">显示已去</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
